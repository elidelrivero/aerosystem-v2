{% extends "base.html" %}
{% block contenido %}

<style>
  .login-wrap {
    min-height: calc(100vh - 140px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    background: linear-gradient(135deg, #f0f4ff 0%, #fafafa 100%);
  }

  .login-card {
    background: white;
    border-radius: 20px;
    box-shadow: var(--shadow-lg);
    padding: 48px 44px;
    width: 100%;
    max-width: 440px;
    border: 1px solid var(--gray-200);
  }

  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-icon {
    width: 56px; height: 56px;
    background: var(--navy);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin: 0 auto 16px;
  }

  .login-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--navy);
    letter-spacing: -.5px;
    margin-bottom: 6px;
  }

  .login-sub {
    font-size: 14px;
    color: var(--gray-400);
    line-height: 1.5;
  }

  .login-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: var(--gray-400);
    font-size: 12px;
  }

  .login-divider::before,
  .login-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gray-200);
  }

  .login-note {
    text-align: center;
    font-size: 12px;
    color: var(--gray-400);
    margin-top: 20px;
    line-height: 1.6;
  }
</style>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">✈</div>
      <div class="login-title">Bienvenido a AeroSystem</div>
      <p class="login-sub">Ingresa tu nombre y correo para comenzar a reservar</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Tu nombre completo</label>
        <input name="nombre" class="form-control"
               placeholder="Ej. Carlos Rodríguez"
               value="{{ request.form.get('nombre','') }}"
               required autofocus>
      </div>

      <div class="form-group" style="margin-bottom:24px">
        <label class="form-label">Correo electrónico</label>
        <input type="email" name="correo" class="form-control"
               placeholder="tucorreo@ejemplo.com"
               value="{{ request.form.get('correo','') }}"
               required>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg">
        Continuar →
      </button>
    </form>

    <p class="login-note">
      Si ya usaste este correo antes, recuperaremos tu cuenta automáticamente.<br>
      No se requiere contraseña.
    </p>
  </div>
</div>

{% endblock %}
